services:
  postgres:
    image: postgres:16-alpine
    container_name: professor-plus-postgres
    environment:
      POSTGRES_DB: professor_plus
      POSTGRES_USER: professor_plus
      POSTGRES_PASSWORD: professor_plus
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U professor_plus -d professor_plus']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: professor-plus-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
